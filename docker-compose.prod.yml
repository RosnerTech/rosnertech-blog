# docker-compose.prod.yml — RosnerTech Blog (produção VPS)
# Localização: /opt/docker/blog-rosnertech/docker-compose.prod.yml
#
# Crie o arquivo .env na mesma pasta com as variáveis necessárias
# Nunca commite o .env no Git!

services:

  # ── Blog Astro (build local na VPS) ───────────────────────
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    image: rosnertech-blog:latest
    container_name: rosnertech-blog
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
    expose:
      - "80"
    networks:
      - radagast_net

  # ── Mídia WordPress (imagens antigas) ─────────────────────
  wp-media:
    image: nginx:alpine
    container_name: rosnertech-wp-media
    restart: unless-stopped
    volumes:
      - /data/compose/3/wordpress/wp-content:/usr/share/nginx/html/wp-content:ro
    expose:
      - "80"
    networks:
      - radagast_net

  # ── Remark42 (comentários self-hosted) ────────────────────
  remark42:
    image: umputun/remark42:latest
    container_name: rosnertech-remark42
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - REMARK_URL=https://comments.blog.rosnertech.com.br
      - SITE=rosnertech
      - SECRET=${REMARK_SECRET}

      # moderação — todos os comentários aguardam aprovação
      - ADMIN_SHARED_EMAIL=${NOTIFY_EMAIL}
      - NOTIFY_ADMINS=email
      - NOTIFY_EMAIL_FROM=${SMTP_FROM}

      # anônimo permitido
      - AUTH_ANON=true
      - ANON_VOTE=false

      # rate limit — máximo 5 comentários por hora por IP
      - RATE_LIMIT=5

      # login Google
      - AUTH_GOOGLE_CID=${AUTH_GOOGLE_CID}
      - AUTH_GOOGLE_CSEC=${AUTH_GOOGLE_CSEC}

      # SMTP2GO
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_TLS=false
      - SMTP_STARTTLS=true

      # moderação obrigatória para anônimos
      - ADMIN_PASSWD=${REMARK_ADMIN_PASSWD}

    volumes:
      - remark42_data:/srv/var
    expose:
      - "8080"
    networks:
      - radagast_net

volumes:
  remark42_data:

networks:
  radagast_net:
    external: true
