services:
  blog-dev:
    image: node:20-alpine
    container_name: rosnertech-blog-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "0.0.0.0:4321:4321"
    environment:
      - NODE_ENV=development
      - TZ=America/Sao_Paulo
    command: sh -c "npm install && npx astro dev --host"
    restart: unless-stopped
